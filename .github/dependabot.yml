# Zero runtime dependencies is invariant 2, so npm updates here are
# devDependencies only (typescript, @types/node, biome) plus the pinned
# GitHub Actions. Weekly is plenty at that surface; grouped so each cycle
# opens at most one PR per ecosystem instead of one per package (the
# initial backlog arrived as five separate PRs).
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      npm-dev:
        patterns:
          - "*"
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns:
          - "*"
