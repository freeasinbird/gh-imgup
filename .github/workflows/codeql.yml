name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly sweep so new CodeQL queries run even when the code is idle.
    - cron: "27 6 * * 1"

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          build-mode: none
      - uses: github/codeql-action/analyze@v3
