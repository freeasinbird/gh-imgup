name: Release

# Publish to npm on a version tag using npm Trusted Publishing (OIDC) — no
# NPM_TOKEN secret, and provenance is generated automatically. The very first
# publish of the package is manual (the trusted publisher is configured on the
# package, which must already exist); this workflow handles every release after
# that (v0.1.1 onward). Re-tagging an already-published version is a no-op — the
# publish step skips when that version is already on the registry.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write # OIDC token for npm Trusted Publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      # Trusted publishing requires npm >= 11.5.1; Node 22 ships an older npm.
      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      # Refuse to publish if the tag doesn't match package.json (v0.1.1 -> 0.1.1).
      - name: Verify tag matches package version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(node -p "require('./package.json').version")"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::tag $GITHUB_REF_NAME (=$tag) does not match package.json version $pkg"
            exit 1
          fi

      # `npm publish` runs the package's own gates: prepack (build) and
      # prepublishOnly (lint + typecheck + test). No token and no --provenance
      # flag — provenance is automatic under trusted publishing. publishConfig in
      # package.json publishes the scoped package publicly. The pre-check makes
      # this idempotent: re-tagging a version already on the registry is a green
      # no-op (a genuine auth/OIDC/network failure still fails, since it isn't
      # "version already exists").
      - name: Publish to npm (skip if this version is already published)
        run: |
          pkg="$(node -p "require('./package.json').name")"
          ver="$(node -p "require('./package.json').version")"
          if npm view "$pkg@$ver" version >/dev/null 2>&1; then
            echo "$pkg@$ver is already published — skipping."
            exit 0
          fi
          npm publish
