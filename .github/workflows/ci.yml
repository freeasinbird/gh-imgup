name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      # Informational coverage report (the suite is fast enough to run twice).
      - run: node --test --experimental-test-coverage dist/*.test.js

  # Fan-in gate: branch protection requires the "check" context by name, so it
  # must keep reporting as one job over the matrix. `if: always()` + the result
  # test makes it fail closed when any leg fails or is skipped/cancelled —
  # a plain `needs:` would report "skipped", which branch protection treats as
  # satisfied.
  check:
    needs: test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: test "${{ needs.test.result }}" = "success"
